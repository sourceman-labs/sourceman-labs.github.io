name: Deploy to GitHub Pages

# This workflow uses the single-repo GitHub Pages pattern:
# - Builds the static site from markdown files in this repository using .NET Razor SSG
# - Deploys the built site to GitHub Pages in the same repository
# - Triggered by: git push or manual dispatch

on:
  # Trigger on push to main branch
  push:
    branches: [main]

  # Allow manual dispatch from Actions tab
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Prerender site
        run: |
          echo "🚀 Building site with Razor SSG..."
          echo "📝 Processing markdown files from _posts/..."
          dotnet run -- --AppTasks=prerender
          echo "✅ Build complete!"

      - name: Build summary
        run: |
          echo "### 📊 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -d "dist" ]; then
            echo "- **Output size**: $(du -sh dist | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "- **Files generated**: $(find dist -type f | wc -l)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
