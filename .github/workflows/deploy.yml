name: Deploy to GitHub Pages

# This workflow uses the single-repo GitHub Pages pattern:
# - Builds the static site from source files in this repository
# - Deploys the built site to GitHub Pages in the same repository
# - Triggered by: git push, manual dispatch, or Contentful webhooks (repository_dispatch)
#
# Webhook URL for Contentful: https://api.github.com/repos/sourceman-labs/sourceman-labs.github.io/dispatches

on:
  # Trigger on push to main branch
  push:
    branches: [main]

  # Allow manual dispatch from Actions tab
  workflow_dispatch:

  # Trigger from Contentful webhooks via repository_dispatch
  # Contentful sends webhook → GitHub API → this workflow triggers
  repository_dispatch:
    types: [contentful_update]

env:
  NODE_VERSION: '22'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          NODE_ENV: production
        run: |
          echo "🚀 Building site with Eleventy..."
          echo "📡 Fetching content from Contentful..."
          npm run build
          echo "✅ Build complete!"

      - name: Build summary
        run: |
          echo "### 📊 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [ -d "_site" ]; then
            echo "- **Output size**: $(du -sh _site | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "- **Files generated**: $(find _site -type f | wc -l)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
